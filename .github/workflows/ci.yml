name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint (PSScriptAnalyzer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck

      - name: Lint scripts/
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./scripts -Recurse -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) error(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no errors found."

  test:
    name: Pester Tests
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Create test configuration
        shell: powershell
        run: |
          # Provide a minimal settings.json so the -WhatIf integration test
          # can run. All paths point to a temporary directory; no real photos
          # or ExifTool output are produced.
          $tempDir  = "$env:GITHUB_WORKSPACE\test-temp"
          $fakeExif = "$tempDir\exiftool.exe"
          New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
          Set-Content $fakeExif -Value "" -Encoding ASCII
          $settings = @{
            Paths = @{
              Source  = $tempDir
              Output  = $tempDir
              Logs    = $tempDir
              Reports = $tempDir
            }
            LocationsJson           = "$env:GITHUB_WORKSPACE\config\locations.example.json"
            ExifToolPath            = $fakeExif
            FallbackLocation        = "Unknown"
            ProximityThresholdMiles = 1.0
            MaxTripMiles            = 250
            SortFolderFormat        = "yyyy/yyMM"
          }
          $settings | ConvertTo-Json |
            Set-Content "$env:GITHUB_WORKSPACE\config\settings.json" -Encoding utf8

      - name: Install Pester 5
        shell: powershell
        run: Install-Module Pester -Force -SkipPublisherCheck -MinimumVersion 5.0

      - name: Run Pester
        # windows-latest ships Pester 3.x; import the freshly installed v5 explicitly.
        # shell: powershell targets Windows PowerShell 5.1 — required for WinRT helpers.
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.0 -Force
          New-Item -ItemType Directory -Path "$env:GITHUB_WORKSPACE\test-results" -Force | Out-Null
          $config = New-PesterConfiguration
          $config.Run.Path                = "$env:GITHUB_WORKSPACE\tests"
          $config.Run.Exit                = $true
          $config.Output.Verbosity        = "Detailed"
          $config.TestResult.Enabled      = $true
          $config.TestResult.OutputFormat = "NUnitXml"
          $config.TestResult.OutputPath   = "$env:GITHUB_WORKSPACE\test-results\pester-results.xml"
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: test-results/pester-results.xml
